name: Deploy Java Backend to GCP VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build Spring Boot Application
        run: ./mvnw clean package -DskipTests

      - name: Execute Deploy Commands via SSH on GCP VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          script: |
            set -e

            REPO_DIR=~/neo-copier-backend-java

            # Clone repo if it doesn't exist yet (first-time deploy)
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://github.com/pawanbudati/neo-copier-backend-java.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            # Fetch latest changes
            git pull origin main

            # Ensure OpenJDK 21 or Java is installed on VM
            if ! command -v java &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y openjdk-21-jdk
            fi

            # Grant execution permission to Maven wrapper
            chmod +x mvnw

            # Build Spring Boot Executable JAR
            ./mvnw clean package -DskipTests

            # Restart backend process in PM2
            pm2 delete neo-copier-backend-java || true
            pm2 start "java -jar target/neo-copier-backend-java-1.0.0.jar" --name "neo-copier-backend-java" --cwd "$REPO_DIR"
            pm2 save
