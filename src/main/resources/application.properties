server.port=${PORT:3000}
spring.application.name=neo-copier-backend-java

# Java Virtual Threads
spring.threads.virtual.enabled=true

# Database Configuration (Automatically parses PostgreSQL URI from .env or DATABASE_URL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging to File & Console
logging.file.name=./data/app.log
logging.level.root=INFO
logging.level.com.neocopier=INFO

# Application Config Defaults
admin.password=${ADMIN_PASSWORD:admin}
kotak.api.base=https://mis.kotaksecurities.com
